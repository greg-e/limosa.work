<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actual Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/actual/assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <img src="/assets/img/logo.png" alt="Actual logo">
        <span>Actual</span>
      </a>

      <!-- Mobile nav toggle -->
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <nav id="site-menu" class="site-nav" data-collapsible>
        <a href="/pages/manifesto.html">Manifesto</a>
        <a href="/pages/principles.html">Principles</a>
        <a href="/pages/outcomes.html">Outcomes</a>
        <a href="/actual/">Deck</a>
        <a href="/pages/partners.html">Partners</a>
        <a href="/pages/product.html">Product</a>
        <a href="/pages/contact.html">Contact</a>
      </nav>
    </header>

    <div
      id="root"
      data-cards-url="/assets/actual-deck/cards.json"
      data-logic-app-url=""
    ></div>
    <script>
      (() => {
        const toggle = document.querySelector('.nav-toggle');
        const menu = document.getElementById('site-menu');
        if (!toggle || !menu) return;

        const setOpen = (isOpen) => {
          toggle.classList.toggle('is-open', isOpen);
          menu.classList.toggle('is-open', isOpen);
          toggle.setAttribute('aria-expanded', String(isOpen));
        };

        toggle.addEventListener('click', () => {
          const nextState = !menu.classList.contains('is-open');
          setOpen(nextState);
        });

        window.addEventListener('resize', () => {
          if (window.innerWidth > 900) {
            setOpen(false);
          }
        });

        document.addEventListener('click', (event) => {
          if (!menu.classList.contains('is-open')) return;
          if (menu.contains(event.target) || toggle.contains(event.target)) return;
          setOpen(false);
        });
      })();
    </script>
    <script type="module" src="/actual/assets/index.js"></script>
  </body>
</html>
