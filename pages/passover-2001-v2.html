<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wednesday Crucifixion Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f1;
      --text: #1f2937;
      --panel: #ffffff;
      --line: #d9d3c3;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      font-size: 18px;
    }

    .page {
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 52px 24px 44px;
      border-bottom: 1px solid var(--line);
    }

    .monolith {
      width: 22px;
      height: 88px;
      background: #f0ece2;
      border: 1px solid #d3cab6;
      box-shadow: 0 10px 24px #8f7f5a1f;
      margin-bottom: 36px;
    }

    .kicker {
      font-size: 12px;
      letter-spacing: 0.24em;
      color: #6b7280;
      margin-bottom: 14px;
    }

    .title {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 700;
      font-size: 40px;
      letter-spacing: 0.04em;
      color: #111827;
      line-height: 1.15;
      margin: 0 0 10px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(to right, transparent, #b6ab95, transparent);
      margin-bottom: 28px;
    }

    .quote {
      max-width: 400px;
      font-family: "Source Sans 3", sans-serif;
      font-style: italic;
      font-weight: 400;
      font-size: 20px;
      color: #374151;
      line-height: 1.75;
    }

    .quote-ref {
      font-size: 12px;
      color: #6b7280;
      letter-spacing: 0.18em;
      margin-top: 10px;
    }

    .timeline-wrap,
    .footer-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .timeline-wrap {
      padding-top: 32px;
    }

    .row {
      display: grid;
      grid-template-columns: 56px 14px 1fr;
      column-gap: 16px;
      margin-bottom: 2px;
      cursor: pointer;
      opacity: 0;
      transform: translateX(-6px);
      animation: none;
    }

    .row.visible {
      animation: fadeIn 0.35s ease forwards;
    }

    .nisan {
      text-align: right;
      padding-top: 14px;
    }

    .nisan-day {
      font-family: "Fraunces", Georgia, serif;
      line-height: 1;
    }

    .nisan-dow {
      font-size: 10px;
      letter-spacing: 0.15em;
      margin-top: 3px;
    }

    .spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 16px;
    }

    .dot {
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.key {
      width: 8px;
      height: 8px;
    }

    .dot.transit {
      width: 4px;
      height: 4px;
      background: #9ca3af;
    }

    .dot.crucifixion {
      width: 10px;
      height: 10px;
      animation: halPulse 2.5s ease-in-out infinite;
    }

    .dot.resurrection {
      width: 10px;
      height: 10px;
      animation: resPulse 3s ease-in-out infinite;
    }

    .spine-line {
      width: 1px;
      height: 100%;
    }

    .spine-track {
      position: relative;
      width: 1px;
      flex: 1;
      min-height: 24px;
      margin-top: 4px;
    }

    .phase-dot {
      position: absolute;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      border: 1px solid #f8f6f1;
      box-shadow: 0 0 0 1px #cbd5e1;
      z-index: 2;
    }

    .phase-dot.sunrise {
      top: 18%;
      background: #f59e0b;
    }

    .phase-dot.sundown {
      top: 82%;
      background: #c2410c;
    }

    .card {
      border-left-width: 2px;
      border-left-style: solid;
      padding: 10px 8px 10px 14px;
      margin-bottom: 2px;
      transition: background 0.15s;
    }

    .row:hover .card {
      background: #f1ede2;
    }

    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .event-title {
      font-family: "Source Sans 3", sans-serif;
      letter-spacing: 0.18em;
    }

    .event-ref {
      font-size: 11px;
      letter-spacing: 0.08em;
    }


    .tag-inferred {
      font-size: 10px;
      color: #4c1d95;
      border: 1px solid #c4b5fd;
      background: #f5f3ff;
      padding: 1px 6px;
      letter-spacing: 0.08em;
    }

    .typology {
      font-size: 11px;
      letter-spacing: 0.18em;
      margin-top: 5px;
      line-height: 1.6;
    }

    .tomb {
      display: flex;
      gap: 6px;
      margin-top: 7px;
    }

    .pill {
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 2px 9px;
      border: 1px solid;
    }

    .notes {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid;
      font-family: "Source Sans 3", sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #374151;
      line-height: 1.7;
      letter-spacing: 0.01em;
      display: none;
    }

    .row.open .notes {
      display: block;
    }

    .sunset {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sunset-line {
      flex: 1;
      border-top: 1px dashed #c7bfb0;
    }

    .sunset-text {
      font-size: 10px;
      color: #6b7280;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 32px;
      margin-bottom: 40px;
    }

    .section-head {
      font-size: 12px;
      letter-spacing: 0.14em;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      border: 1px solid;
    }

    .table-row {
      display: grid;
      grid-template-columns: 90px 160px 1fr;
      gap: 16px;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 2px solid;
    }

    .small {
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .small-muted {
      font-size: 10px;
      color: #444440;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    .table-mid {
      font-size: 12px;
      color: #6b7280;
      letter-spacing: 0.03em;
      line-height: 1.6;
    }

    .table-right {
      font-family: "Source Sans 3", sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #374151;
      line-height: 1.6;
    }

    .resolve-row {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      align-items: baseline;
    }

    .resolve-ref {
      font-size: 11px;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      width: 88px;
    }

    .resolve-text {
      font-family: "Source Sans 3", sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #374151;
      line-height: 1.7;
    }

    .resolve-note {
      margin-top: 14px;
      padding-left: 108px;
      font-family: "Source Sans 3", sans-serif;
      font-weight: 400;
      font-style: italic;
      font-size: 17px;
      color: #4b5563;
      line-height: 1.7;
    }

    .closing {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #e5dfd2;
    }

    .closing-text {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #6b7280;
      margin-bottom: 16px;
      text-align: center;
    }

    .closing-monolith {
      width: 12px;
      height: 48px;
      background: #f0ece2;
      border: 1px solid #d3cab6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes halPulse {
      0%,
      100% {
        box-shadow: 0 0 4px #dc2626, 0 0 12px #dc262640;
      }
      50% {
        box-shadow: 0 0 8px #dc2626, 0 0 20px #dc262666;
      }
    }

    @keyframes resPulse {
      0%,
      100% {
        box-shadow: 0 0 4px #16a34a, 0 0 12px #16a34a40;
      }
      50% {
        box-shadow: 0 0 8px #16a34a, 0 0 20px #16a34a66;
      }
    }

    @media (max-width: 760px) {
      .title {
        font-size: 30px;
      }

      .timeline-wrap,
      .footer-wrap {
        padding-left: 12px;
        padding-right: 12px;
      }

      .row {
        grid-template-columns: 46px 14px 1fr;
        column-gap: 10px;
      }

      .table-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .resolve-row {
        gap: 8px;
        flex-direction: column;
      }

      .resolve-ref {
        width: auto;
      }

      .resolve-note {
        padding-left: 0;
      }

    }
  </style>
</head>
<body>
  <div class="page">
    <main class="content">
      <header class="header">
        <div class="monolith" aria-hidden="true"></div>
        <div class="kicker">NISAN CALENDAR // PASSION WEEK</div>
        <h1 class="title">THE WEDNESDAY<br />CRUCIFIXION</h1>
        <div class="divider" aria-hidden="true"></div>
        <div class="quote">
          "For just as Jonah was in the belly of the huge fish for three days and three nights, so the Son of Man will be in the heart of the earth for three days and three nights."
        </div>
        <div class="quote-ref">MATTHEW 12:40 NET</div>
      </header>

      <section class="timeline-wrap" id="timeline"></section>

      <footer class="footer-wrap">
        <section class="section" id="matthew"></section>
        <section class="section" id="typology"></section>
        <section class="section" id="resolution"></section>
        <div class="closing">
          <div class="closing-text">TAP ANY ROW TO EXPAND // NET BIBLE TRANSLATION</div>
          <div class="closing-monolith" aria-hidden="true"></div>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const days = [
      {
        nisan: 8, dow: "THU", title: "JERICHO",
        type: "transit", anchor: false,
        typology: null,
        ref: "LUKE 19:1",
        notes: "Zacchaeus encounter. Overnight stay. Departure imminent.",
        tomb: null,
      },
      {
        nisan: 9, dow: "FRI", title: "BETHANY ARRIVAL",
        type: "anchor", anchor: true,
        typology: "SIX DAYS BEFORE PASSOVER",
        ref: "JOHN 12:1",
        notes: "Primary chronological anchor. All downstream dates calculated from this fixed point. At sunset Nisan 10 begins.",
        tomb: null,
        sunset: "NISAN 10 INITIATES  //  EXODUS 12:3",
      },
      {
        nisan: 10, dow: "SAT", title: "TRIUMPHAL ENTRY",
        type: "lamb", anchor: true,
        typology: "PASSOVER LAMB PRESENTED TO ISRAEL",
        ref: "JOHN 12:12  //  EXODUS 12:3",
        notes: "Next day after Bethany arrival. The Lamb of God presents himself to Jerusalem on the precise day Israel was commanded to select the Passover lamb. Tradition calls this Palm Sunday. The text and typology demand Palm Saturday.",
        tomb: null,
      },
      {
        nisan: 11, dow: "SUN", title: "BETHANY",
        type: "transit", anchor: false,
        typology: null, ref: null,
        notes: "Rest at Bethany.",
        tomb: null,
      },
      {
        nisan: 12, dow: "MON", title: "TEMPLE",
        type: "transit", anchor: false,
        typology: null, ref: "MARK 11:15",
        notes: "Fig tree cursed. Temple cleansed.",
        tomb: null,
      },
      {
        nisan: 13, dow: "TUE", title: "OLIVET DISCOURSE",
        type: "transit", anchor: false,
        typology: null, ref: "MARK 13",
        notes: "Bethany. The discourse on the end of the age.",
        tomb: null,
      },
      {
        nisan: 14, dow: "WED", title: "CRUCIFIXION",
        type: "crucifixion", anchor: true,
        typology: "PASSOVER LAMB SLAUGHTERED AT TWILIGHT",
        ref: "JOHN 19:14  //  EXODUS 12:6",
        notes: "Upper Room meal. Preparation Day. Arrested, tried, crucified, buried before sunset. The lamb is slaughtered. The veil tears.",
        tomb: null,
        sunset: "NISAN 15 INITIATES  //  NIGHT 1 BEGINS",
      },
      {
        nisan: 15, dow: "THU", title: "HIGH SABBATH",
        type: "high-sabbath", anchor: true,
        typology: "PASSOVER  //  FEAST OF UNLEAVENED BREAD",
        ref: "JOHN 19:31  //  LEV 23:7",
        notes: "Megas sabbaton. A great sabbath. Holy convocation. Distinct from the weekly sabbath. The tomb is sealed.",
        tomb: { n: 1, d: 1 },
        sunset: "NIGHT 2 BEGINS",
      },
      {
        nisan: 16, dow: "FRI", title: "SPICE GAP",
        type: "gap", anchor: true,
        typology: "THE DAY BETWEEN TWO SABBATHS",
        ref: "MARK 16:1  //  LUKE 23:56",
        notes: "Mark 16:1 — women buy spices after the sabbath. Luke 23:56 — women prepare spices then rest on the sabbath. This single day resolves what is otherwise a direct contradiction. The Friday crucifixion view has no answer.",
        tomb: { n: 2, d: 2 },
        sunset: "NIGHT 3 BEGINS",
      },
      {
        nisan: 17, dow: "SAT", title: "WEEKLY SABBATH",
        type: "sabbath", anchor: true,
        typology: null,
        ref: "LUKE 23:56",
        notes: "Women rest according to the commandment. The fourth commandment.",
        tomb: { n: 3, d: 3 },
      },
      {
        nisan: 18, dow: "SUN", title: "RESURRECTION",
        type: "resurrection", anchor: true,
        typology: "THREE DAYS AND THREE NIGHTS  //  FULFILLED",
        ref: "MARK 16:2  //  MATTHEW 12:40",
        notes: "Women arrive at sunrise. The stone is rolled away. The tomb is empty. Jesus is alive. Every count is satisfied. The sign of Jonah is complete.",
        tomb: null,
      },
    ];

    const theme = {
      transit: {
        dot: "#9ca3af", text: "#4b5563", sub: "#6b7280", border: "#d1d5db", bg: "#f3f4f6",
      },
      anchor: {
        dot: "#0f766e", text: "#115e59", sub: "#0f766e", border: "#7dd3c7", bg: "#ecfdf8",
      },
      lamb: {
        dot: "#d97706", text: "#92400e", sub: "#b45309", border: "#f59e0b", bg: "#fffbeb",
      },
      crucifixion: {
        dot: "#dc2626", text: "#991b1b", sub: "#b91c1c", border: "#f87171", bg: "#fef2f2",
      },
      "high-sabbath": {
        dot: "#ea580c", text: "#9a3412", sub: "#c2410c", border: "#fb923c", bg: "#fff7ed",
      },
      gap: {
        dot: "#a16207", text: "#713f12", sub: "#854d0e", border: "#d4a34f", bg: "#fffbeb",
      },
      sabbath: {
        dot: "#2563eb", text: "#1e3a8a", sub: "#1d4ed8", border: "#60a5fa", bg: "#eff6ff",
      },
      resurrection: {
        dot: "#16a34a", text: "#166534", sub: "#15803d", border: "#4ade80", bg: "#f0fdf4",
      },
    };

    const state = {
      open: null,
    };

    function makeDot(type, palette) {
      const dot = document.createElement("div");
      dot.className = "dot";

      if (type === "crucifixion") {
        dot.classList.add("crucifixion");
        dot.style.background = palette.dot;
      } else if (type === "resurrection") {
        dot.classList.add("resurrection");
        dot.style.background = palette.dot;
      } else if (type === "transit") {
        dot.classList.add("transit");
      } else {
        dot.classList.add("key");
        dot.style.background = palette.dot;
        dot.style.boxShadow = `0 0 8px ${palette.dot}99`;
      }

      return dot;
    }

    function renderTimeline() {
      const root = document.getElementById("timeline");
      root.innerHTML = "";

      days.forEach((d, i) => {
        const palette = theme[d.type];
        const isKey = d.type !== "transit";
        const row = document.createElement("article");
        row.className = "row";
        if (state.open === i) {
          row.classList.add("open");
        }

        const left = document.createElement("div");
        left.className = "nisan";

        const nisan = document.createElement("div");
        nisan.className = "nisan-day";
        nisan.textContent = String(d.nisan);
        nisan.style.fontWeight = isKey ? "800" : "300";
        nisan.style.fontSize = isKey ? "24px" : "16px";
        nisan.style.color = isKey ? palette.text : "#9ca3af";

        const dow = document.createElement("div");
        dow.className = "nisan-dow";
        dow.textContent = d.dow;
        dow.style.color = isKey ? palette.sub : "#9ca3af";

        left.appendChild(nisan);
        left.appendChild(dow);

        const spine = document.createElement("div");
        spine.className = "spine";
        spine.appendChild(makeDot(d.type, palette));

        if (i < days.length - 1) {
          const track = document.createElement("div");
          track.className = "spine-track";

          const line = document.createElement("div");
          line.className = "spine-line";
          line.style.background = "linear-gradient(to bottom, #1e3a8a 0%, #1e3a8a 18%, #fde68a 18%, #fde68a 82%, #9a3412 82%, #9a3412 100%)";

          const sunriseDot = document.createElement("div");
          sunriseDot.className = "phase-dot sunrise";

          const sundownDot = document.createElement("div");
          sundownDot.className = "phase-dot sundown";

          track.appendChild(line);
          track.appendChild(sunriseDot);
          track.appendChild(sundownDot);
          spine.appendChild(track);
        }

        const card = document.createElement("div");
        card.className = "card";

        const isOpen = state.open === i;
        card.style.background = isOpen ? palette.bg : "transparent";
        card.style.borderLeftColor = isOpen ? palette.dot : (isKey ? palette.border : "#e5e7eb");
        card.style.borderLeftWidth = isOpen ? "3px" : "2px";
        card.style.paddingBottom = isOpen ? "16px" : "10px";

        const titleRow = document.createElement("div");
        titleRow.className = "title-row";

        const title = document.createElement("span");
        title.className = "event-title";
        title.textContent = d.title;
        title.style.fontWeight = isKey ? "700" : "300";
        title.style.fontSize = isKey ? "17px" : "14px";
        title.style.color = isKey ? palette.text : "#6b7280";

        titleRow.appendChild(title);

        if (d.ref) {
          const ref = document.createElement("span");
          ref.className = "event-ref";
          ref.textContent = d.ref;
          ref.style.color = isKey ? palette.sub : "#9ca3af";
          titleRow.appendChild(ref);
        }

        if (!d.anchor) {
          const inferred = document.createElement("span");
          inferred.className = "tag-inferred";
          inferred.textContent = "INFERRED";
          titleRow.appendChild(inferred);
        }

        card.appendChild(titleRow);

        if (d.typology) {
          const typology = document.createElement("div");
          typology.className = "typology";
          typology.textContent = d.typology;
          typology.style.color = palette.sub;
          card.appendChild(typology);
        }

        if (d.tomb) {
          const tomb = document.createElement("div");
          tomb.className = "tomb";

          const night = document.createElement("span");
          night.className = "pill";
          night.textContent = `NIGHT ${d.tomb.n}`;
          night.style.color = "#4338ca";
          night.style.background = "#eef2ff";
          night.style.borderColor = "#c7d2fe";

          const day = document.createElement("span");
          day.className = "pill";
          day.textContent = `DAY ${d.tomb.d}`;
          day.style.color = "#9a3412";
          day.style.background = "#fff7ed";
          day.style.borderColor = "#fdba74";

          tomb.appendChild(night);
          tomb.appendChild(day);
          card.appendChild(tomb);
        }

        const notes = document.createElement("div");
        notes.className = "notes";
        notes.textContent = d.notes;
        notes.style.borderTopColor = palette.border;
        card.appendChild(notes);

        if (d.sunset) {
          const sunset = document.createElement("div");
          sunset.className = "sunset";

          const leftLine = document.createElement("div");
          leftLine.className = "sunset-line";

          const text = document.createElement("span");
          text.className = "sunset-text";
          text.textContent = `SUNDOWN DETAIL  //  ${d.sunset}`;

          const rightLine = document.createElement("div");
          rightLine.className = "sunset-line";

          sunset.appendChild(leftLine);
          sunset.appendChild(text);
          sunset.appendChild(rightLine);
          card.appendChild(sunset);
        }

        row.appendChild(left);
        row.appendChild(spine);
        row.appendChild(card);

        row.addEventListener("click", () => {
          state.open = state.open === i ? null : i;
          renderTimeline();
        });

        root.appendChild(row);

        setTimeout(() => {
          row.classList.add("visible");
        }, i * 90 + 300);
      });
    }

    function renderFooter() {
      const matthew = document.getElementById("matthew");
      matthew.innerHTML = "";

      const headA = document.createElement("div");
      headA.className = "section-head";
      headA.textContent = "MATTHEW 12:40  //  SIGN OF JONAH  //  FULFILLED";
      matthew.appendChild(headA);

      const chipsWrap = document.createElement("div");
      chipsWrap.className = "chips";
      [
        { label: "WED NIGHT", night: true },
        { label: "THU NIGHT", night: true },
        { label: "FRI NIGHT", night: true },
        { label: "THU DAY", night: false },
        { label: "FRI DAY", night: false },
        { label: "SAT DAY", night: false },
      ].forEach((item) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = item.label;
        chip.style.color = item.night ? "#4338ca" : "#9a3412";
        chip.style.background = item.night ? "#eef2ff" : "#fff7ed";
        chip.style.borderColor = item.night ? "#c7d2fe" : "#fdba74";
        chipsWrap.appendChild(chip);
      });
      matthew.appendChild(chipsWrap);

      const typology = document.getElementById("typology");
      typology.innerHTML = "";

      const headB = document.createElement("div");
      headB.className = "section-head";
      headB.textContent = "PASSOVER LAMB TYPOLOGY";
      typology.appendChild(headB);

      [
        {
          ref: "EXODUS 12:3",
          nisan: "NISAN 10",
          type: "LAMB SELECTED",
          fulfill: "Jesus presents himself to Jerusalem on lamb selection day",
          col: theme.lamb.text,
          bdr: theme.lamb.dot,
        },
        {
          ref: "EXODUS 12:6",
          nisan: "NISAN 14",
          type: "LAMB SLAUGHTERED AT TWILIGHT",
          fulfill: "Jesus crucified on Preparation Day before sunset",
          col: theme.crucifixion.text,
          bdr: theme.crucifixion.dot,
        },
        {
          ref: "JOHN 1:29",
          nisan: null,
          type: "LAMB OF GOD",
          fulfill: "Takes away the sin of the world",
          col: theme.resurrection.text,
          bdr: theme.resurrection.dot,
        },
      ].forEach((rowData) => {
        const row = document.createElement("div");
        row.className = "table-row";
        row.style.borderLeftColor = rowData.bdr;

        const c1 = document.createElement("div");
        const ref = document.createElement("div");
        ref.className = "small";
        ref.style.color = rowData.col;
        ref.textContent = rowData.ref;
        c1.appendChild(ref);

        if (rowData.nisan) {
          const nisan = document.createElement("div");
          nisan.className = "small-muted";
          nisan.textContent = rowData.nisan;
          c1.appendChild(nisan);
        }

        const c2 = document.createElement("div");
        c2.className = "table-mid";
        c2.textContent = rowData.type;

        const c3 = document.createElement("div");
        c3.className = "table-right";
        c3.textContent = rowData.fulfill;

        row.appendChild(c1);
        row.appendChild(c2);
        row.appendChild(c3);
        typology.appendChild(row);
      });

      const resolution = document.getElementById("resolution");
      resolution.innerHTML = "";

      const headC = document.createElement("div");
      headC.className = "section-head";
      headC.textContent = "TWO SABBATH RESOLUTION";
      resolution.appendChild(headC);

      [
        { ref: "MARK 16:1", text: "Women buy spices after the sabbath.", col: theme["high-sabbath"].text },
        { ref: "LUKE 23:56", text: "Women prepare spices then rest on the sabbath.", col: theme.sabbath.text },
      ].forEach((item) => {
        const row = document.createElement("div");
        row.className = "resolve-row";

        const ref = document.createElement("span");
        ref.className = "resolve-ref";
        ref.style.color = item.col;
        ref.textContent = item.ref;

        const text = document.createElement("span");
        text.className = "resolve-text";
        text.textContent = item.text;

        row.appendChild(ref);
        row.appendChild(text);
        resolution.appendChild(row);
      });

      const note = document.createElement("div");
      note.className = "resolve-note";
      note.textContent = "Nisan 16 Friday is the only day that satisfies both statements without contradiction. The Friday crucifixion view produces an irreconcilable conflict between these two verses.";
      resolution.appendChild(note);
    }

    renderTimeline();
    renderFooter();
  </script>
</body>
</html>
