<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Actual equipment tag concept render">
  <title>Actual Equipment Tag Concept</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf1eb"/>
      <stop offset="100%" stop-color="#d5ddd4"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#233d39"/>
      <stop offset="100%" stop-color="#12211e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1260" cy="900" r="250" fill="#c35c2d" opacity="0.10"/>
  <circle cx="240" cy="180" r="200" fill="#224c44" opacity="0.10"/>

  <text x="120" y="130" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="78" font-weight="700">Equipment Tag Concept</text>
  <text x="120" y="190" fill="#4a4a4a" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30">BLE tag mounted to truck, trailer, mower, or handheld equipment. Passive identity for work context.</text>

  <g filter="url(#shadow)">
    <rect x="445" y="330" width="710" height="430" rx="84" ry="84" fill="url(#tag)"/>
    <rect x="520" y="405" width="560" height="280" rx="44" ry="44" fill="#1d2d2b" stroke="#49625d" stroke-width="3"/>
    <circle cx="580" cy="465" r="18" fill="#91b09d"/>
    <circle cx="1020" cy="465" r="18" fill="#91b09d"/>
    <circle cx="580" cy="625" r="18" fill="#91b09d"/>
    <circle cx="1020" cy="625" r="18" fill="#91b09d"/>
    <rect x="628" y="468" width="344" height="150" rx="26" ry="26" fill="#eff3ea"/>
    <text x="800" y="525" text-anchor="middle" fill="#16211f" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700">MOWER 12</text>
    <text x="800" y="570" text-anchor="middle" fill="#46514f" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Actual Equipment Tag</text>
  </g>

  <g>
    <rect x="170" y="330" width="220" height="220" rx="28" ry="28" fill="#f7f9f5"/>
    <text x="205" y="390" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">Mounts to</text>
    <text x="205" y="438" fill="#4b4b4b" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Truck doors</text>
    <text x="205" y="474" fill="#4b4b4b" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Trailer frames</text>
    <text x="205" y="510" fill="#4b4b4b" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Mower bodies</text>
  </g>

  <g>
    <rect x="1220" y="340" width="250" height="160" rx="28" ry="28" fill="#f7f9f5"/>
    <text x="1255" y="398" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">What it does</text>
    <text x="1255" y="446" fill="#4b4b4b" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Broadcasts BLE identity</text>
    <text x="1255" y="482" fill="#4b4b4b" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Lets badge infer work context</text>
  </g>

  <g stroke="#c35c2d" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M390 442 C430 442 455 442 500 442"/>
    <path d="M1155 468 C1210 468 1225 445 1240 430"/>
    <path d="M1060 710 C1195 765 1280 825 1355 915"/>
  </g>

  <g>
    <circle cx="1370" cy="930" r="16" fill="#c35c2d"/>
    <rect x="1110" y="870" width="330" height="120" rx="26" ry="26" fill="#fffdf8"/>
    <text x="1144" y="925" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700">Not attached to properties</text>
    <text x="1144" y="958" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Tags live on equipment the crew is actively using.</text>
  </g>

  <g>
    <text x="120" y="1090" fill="#2a2a2a" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Concept only. Rugged puck / plate form to communicate function, not final packaging.</text>
  </g>
</svg>