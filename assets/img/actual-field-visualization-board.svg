<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-label="Actual field system concept board">
  <title>Actual Field Visualization Board</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2e8"/>
      <stop offset="100%" stop-color="#ece4d2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f2e7"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="1560" cy="170" r="180" fill="#d76a32" opacity="0.12"/>
  <circle cx="150" cy="1060" r="220" fill="#214a43" opacity="0.10"/>

  <text x="90" y="110" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="76" font-weight="700">Actual in the Field</text>
  <text x="90" y="168" fill="#454545" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30">A partner-facing concept board showing how badge identity and equipment tags create a live record of work.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="245" width="1040" height="800" rx="42" ry="42" fill="url(#panel)"/>
    <rect x="1180" y="245" width="530" height="800" rx="42" ry="42" fill="url(#panel)"/>
  </g>

  <g>
    <rect x="150" y="316" width="920" height="650" rx="32" ry="32" fill="#dfe8d8"/>
    <rect x="210" y="370" width="800" height="530" rx="28" ry="28" fill="#d5e3cb"/>
    <path d="M210 660 C320 605 410 615 520 665 C635 717 735 722 840 670 C910 636 970 617 1010 625" stroke="#b8cfab" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M255 770 C370 720 480 730 590 788 C700 847 810 847 935 786" stroke="#c7b596" stroke-width="24" fill="none" stroke-linecap="round"/>
    <rect x="325" y="520" width="120" height="74" rx="12" ry="12" fill="#ffffff" stroke="#b2c4aa" stroke-width="3"/>
    <rect x="455" y="535" width="96" height="58" rx="10" ry="10" fill="#214a43"/>
    <circle cx="495" cy="602" r="16" fill="#1a1a1a"/>
    <circle cx="541" cy="602" r="16" fill="#1a1a1a"/>
    <rect x="725" y="520" width="110" height="70" rx="12" ry="12" fill="#d76a32"/>
    <circle cx="748" cy="598" r="14" fill="#1a1a1a"/>
    <circle cx="812" cy="598" r="14" fill="#1a1a1a"/>
    <circle cx="610" cy="620" r="14" fill="#d76a32"/>
    <circle cx="780" cy="618" r="14" fill="#d76a32"/>
    <circle cx="610" cy="620" r="42" fill="none" stroke="#d76a32" stroke-width="4" opacity="0.55"/>
    <circle cx="610" cy="620" r="88" fill="none" stroke="#d76a32" stroke-width="3" opacity="0.30"/>
    <circle cx="780" cy="618" r="42" fill="none" stroke="#d76a32" stroke-width="4" opacity="0.55"/>
    <circle cx="780" cy="618" r="88" fill="none" stroke="#d76a32" stroke-width="3" opacity="0.30"/>

    <g transform="translate(575 455)">
      <circle cx="0" cy="0" r="28" fill="#202020"/>
      <rect x="-18" y="30" width="36" height="94" rx="16" ry="16" fill="#202020"/>
      <rect x="-66" y="70" width="48" height="18" rx="9" ry="9" fill="#202020" transform="rotate(-20 -42 79)"/>
      <rect x="18" y="70" width="48" height="18" rx="9" ry="9" fill="#202020" transform="rotate(20 42 79)"/>
      <rect x="-45" y="128" width="38" height="18" rx="9" ry="9" fill="#202020" transform="rotate(18 -26 137)"/>
      <rect x="7" y="128" width="38" height="18" rx="9" ry="9" fill="#202020" transform="rotate(-18 26 137)"/>
      <rect x="30" y="14" width="54" height="86" rx="18" ry="18" fill="url(#badge)"/>
      <rect x="38" y="26" width="38" height="46" rx="8" ry="8" fill="#f3f3ed"/>
      <circle cx="57" cy="84" r="6" fill="#d76a32"/>
    </g>

    <g transform="translate(116 0)">
      <rect x="0" y="326" width="190" height="96" rx="24" ry="24" fill="#fffcf6" opacity="0.92"/>
      <text x="28" y="384" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">Crew member enters site</text>
    </g>

    <g transform="translate(620 0)">
      <rect x="0" y="780" width="250" height="96" rx="24" ry="24" fill="#fffcf6" opacity="0.92"/>
      <text x="28" y="838" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">Badge detects nearby mower</text>
    </g>
  </g>

  <g>
    <text x="1240" y="325" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700">What a partner should understand</text>

    <rect x="1240" y="385" width="410" height="128" rx="28" ry="28" fill="#fffaf1"/>
    <text x="1274" y="440" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">1. Badge = worker identity</text>
    <text x="1274" y="477" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">No phone required for the crew member to create a record.</text>

    <rect x="1240" y="540" width="410" height="128" rx="28" ry="28" fill="#fffaf1"/>
    <text x="1274" y="595" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">2. Tag = equipment identity</text>
    <text x="1274" y="632" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Tags are mounted to trucks, trailers, and mowers, not properties.</text>

    <rect x="1240" y="695" width="410" height="128" rx="28" ry="28" fill="#fffaf1"/>
    <text x="1274" y="750" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">3. System infers real work</text>
    <text x="1274" y="787" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Location + time + nearby equipment create passive provenance.</text>

    <rect x="1240" y="850" width="410" height="128" rx="28" ry="28" fill="#fffaf1"/>
    <text x="1274" y="905" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">4. Owner sees usable proof</text>
    <text x="1274" y="942" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">The output is a live operational record, not another form crews fill out.</text>
  </g>

  <g>
    <text x="90" y="1120" fill="#2a2a2a" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Concept board for charter partner conversations. Built to clarify the product narrative before final industrial design.</text>
  </g>
</svg>