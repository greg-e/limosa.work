<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Actual badge concept render">
  <title>Actual Badge Concept</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f1e8"/>
      <stop offset="100%" stop-color="#ddd6c7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f2"/>
      <stop offset="100%" stop-color="#e2e5dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1310" cy="260" r="260" fill="#d96c32" opacity="0.12"/>
  <circle cx="250" cy="980" r="320" fill="#224c44" opacity="0.10"/>

  <text x="120" y="130" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="78" font-weight="700">Actual Badge Concept</text>
  <text x="120" y="190" fill="#454545" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30">Wearable identity hardware for field crews. Built to be seen, worn, and trusted at a glance.</text>

  <g filter="url(#shadow)">
    <path d="M640 245 C655 210 695 180 744 180 L866 180 C915 180 955 210 970 245 L1000 318 C1014 349 1016 383 1004 414 L939 584 C923 625 884 652 840 652 L770 652 C726 652 687 625 671 584 L606 414 C594 383 596 349 610 318 Z" fill="#202020" opacity="0.88"/>
    <rect x="555" y="270" rx="64" ry="64" width="500" height="700" fill="url(#card)"/>
    <rect x="590" y="325" rx="34" ry="34" width="430" height="420" fill="url(#screen)"/>
    <circle cx="805" cy="270" r="16" fill="#4b4b4b"/>
    <circle cx="805" cy="270" r="7" fill="#1f1f1f"/>
    <rect x="700" y="782" rx="18" ry="18" width="210" height="68" fill="#0f0f0f" stroke="#595959" stroke-width="2"/>
    <text x="805" y="825" text-anchor="middle" fill="#e9e4d8" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700">START SHIFT</text>
    <rect x="668" y="875" rx="22" ry="22" width="274" height="44" fill="#1b1b1b" stroke="#3b3b3b" stroke-width="2"/>
    <circle cx="710" cy="897" r="8" fill="#78b38c"/>
    <text x="736" y="907" fill="#cccccc" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Connected via cellular</text>
  </g>

  <g>
    <text x="645" y="385" fill="#141414" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700">ACTUAL</text>
    <text x="645" y="425" fill="#626262" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Crew identity badge</text>

    <rect x="645" y="462" rx="16" ry="16" width="320" height="122" fill="#ffffff" stroke="#d7dacd" stroke-width="2"/>
    <text x="675" y="512" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700">Miguel A.</text>
    <text x="675" y="550" fill="#5b5b5b" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Crew Lead • Crew 03</text>

    <text x="645" y="635" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="700">Status</text>
    <text x="645" y="675" fill="#454545" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">On property: Glenwood Medical</text>
    <text x="645" y="710" fill="#454545" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Equipment nearby: Truck 4, Mower 12</text>
  </g>

  <g filter="url(#soft)">
    <rect x="120" y="300" width="310" height="240" rx="30" ry="30" fill="#f9f7f1"/>
    <text x="155" y="360" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700">Why this feels real</text>
    <text x="155" y="410" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Visible name and status</text>
    <text x="155" y="448" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Simple one-action workflow</text>
    <text x="155" y="486" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Rugged housing with lanyard mount</text>
  </g>

  <g stroke="#d96c32" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M430 430 C500 430 515 430 560 430"/>
    <path d="M1050 420 C1130 410 1185 390 1240 330"/>
    <path d="M1015 808 C1130 830 1210 860 1290 910"/>
  </g>

  <g>
    <circle cx="1278" cy="315" r="16" fill="#d96c32"/>
    <rect x="1210" y="220" width="250" height="110" rx="24" ry="24" fill="#fffaf1"/>
    <text x="1240" y="275" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700">E-ink face</text>
    <text x="1240" y="308" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Readable in direct sun.</text>
  </g>

  <g>
    <circle cx="1310" cy="908" r="16" fill="#d96c32"/>
    <rect x="1170" y="850" width="300" height="120" rx="24" ry="24" fill="#fffaf1"/>
    <text x="1200" y="905" fill="#111111" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700">One-button interaction</text>
    <text x="1200" y="938" fill="#4c4c4c" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="22">Start and end shift without a phone.</text>
  </g>

  <g>
    <text x="120" y="1090" fill="#2a2a2a" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24">Concept only. Intended for partner conversations, not final industrial design.</text>
  </g>
</svg>