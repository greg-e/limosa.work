<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="336" viewBox="0 0 1680 336" role="img" aria-label="Actual wordmark light reversed print">
  <title>Actual Wordmark Light Reversed — Print</title>
  <!-- Reversed (light on dark): use on dark slide covers or printed dark backgrounds -->
  <!-- #F4EFE4 = C:4 M:3 Y:9 K:0 -->
  <rect width="1680" height="336" fill="#111111"/>
  <g transform="translate(96 80)">
    <circle cx="72" cy="88" r="56" fill="#F4EFE4"/>
    <path d="M160 88h232" stroke="#F4EFE4" stroke-width="20" stroke-linecap="round"/>
    <text x="472" y="120" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="152" font-weight="600" fill="#F4EFE4">Actual</text>
  </g>
</svg>
