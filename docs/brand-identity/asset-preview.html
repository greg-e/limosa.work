<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actual Brand Assets Preview</title>
    <style>
      :root {
        --ink: #111111;
        --paper: #f4efe4;
        --dark: #1e4a42;
        --line: rgba(17, 17, 17, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(160deg, #f7f2e8 0%, #ece2ce 100%);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 6vw, 56px);
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 24px;
        font-size: 18px;
        line-height: 1.5;
        color: #5c5850;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        background: rgba(255,255,255,0.72);
      }

      .dark {
        background: var(--dark);
      }

      .label {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Actual Brand Assets</h1>
      <p>Quick preview for logo lockups and mark variants in the Brand Identity Package.</p>

      <section class="grid">
        <article class="card">
          <h2 class="label">Wordmark / Primary</h2>
          <img src="../../assets/brand/actual-wordmark-primary.svg" alt="Actual primary wordmark" />
        </article>

        <article class="card dark">
          <h2 class="label" style="color:#f4efe4;">Wordmark / Light</h2>
          <img src="../../assets/brand/actual-wordmark-light.svg" alt="Actual light wordmark" />
        </article>

        <article class="card">
          <h2 class="label">Mark / Primary</h2>
          <img src="../../assets/brand/actual-mark.svg" alt="Actual mark primary" style="width: 96px;" />
        </article>

        <article class="card dark">
          <h2 class="label" style="color:#f4efe4;">Mark / Light</h2>
          <img src="../../assets/brand/actual-mark-light.svg" alt="Actual mark light" style="width: 96px;" />
        </article>
      </section>
    </main>
  </body>
</html>
